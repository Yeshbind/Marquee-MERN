<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   <style>
            *{
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }

        html,body{
            width: 100%;
            height: 100%;
        }

        body{
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .box{
            width: 100px;
            height: 100px;
            background-color: rgb(164, 216, 61);
        }
        
        .box:hover{
            transform:
            translateX(800px)
            rotate(2160deg);
        }
   </style>

   
</head>
<body>
    <div class="box">
        Lorem ipsum dolor sit amet consectetur adipisicing
         
    </div>
</body>
</html>
