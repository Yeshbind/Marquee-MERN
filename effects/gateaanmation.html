<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   <style>
            *{
            margin: 0px;
            padding: 0px;
            
        }

        html,body{
            width: 100%;
            height: 100%;
        }

        body{
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container{
            width: 404px;
            height: 404px;
            background-image: url(https://plus.unsplash.com/premium_vector-1689096627500-db28ccd880b3?q=80&w=1074&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D);
            background-size: 100%;
            display: flex;
            flex-wrap: wrap;
        }
        
      
        .box{
            width: 200px;
            height: 200px;
            background-color: rgb(47, 14, 14);
            border: solid 1px;
            transition: all 1s ease;
        }

        .container{
            .box1{
                transform-origin: top left;
            }

            .box2{
                transform-origin: top right ;
            }
             .box3{
                transform-origin: bottom left;
            }

            .box4{
                transform-origin: bottom right ;
            }
        }

        .container:hover{
            .box1{
                transform: rotate(190deg);
            }
            .box2{
                transform: rotate(-190deg);
            }
            .box3{
                transform: rotate(-190deg);
            }
            .box4{
                transform: rotate(190deg);
            }
        }
   </style>

   
</head>
<body>
    <div class="container">
       <div class="box  box1"></div>
       <div class="box  box2"></div>
       <div class="box  box3"></div>
       <div class="box  box4"></div>
         
    </div>
</body>
</html>
