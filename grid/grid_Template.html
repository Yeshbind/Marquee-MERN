<!DOCTYPE html>
<html>
<head>
<style>
.grid{
    display:grid;
    grid-template-columns:repeat(5,40px);
    grid-template-rows:repeat(5,40px);
    gap:4px;
}

.box{
    width:40px;
    height:40px;
    background:#333;
}

.b1{grid-column:1;grid-row:1;}
.b2{grid-column:5;grid-row:1;}
.b3{grid-column:2;grid-row:2;}
.b4{grid-column:4;grid-row:2;}
.b5{grid-column:3;grid-row:3;}
.b6{grid-column:3;grid-row:4;}
.b7{grid-column:3;grid-row:5;}
</style>
</head>
<body>

<div class="grid">
    <div class="box b1"></div>
    <div class="box b2"></div>
    <div class="box b3"></div>
    <div class="box b4"></div>
    <div class="box b5"></div>
    <div class="box b6"></div>
    <div class="box b7"></div>
</div>

</body>
</html>
