<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: grid;
            grid-template-columns: 150px 250px 150px;
            grid-template-rows: 150px 150px 150px;
            background-color: rgb(17, 16, 16);
            width: 550px;
            gap: 5px;
        }
        .item1, .item2, .item3, .item4, .item5, .item6, .item7, .item8, .item9{
            width: 70px;
            height: 70px;
            background-color: rgb(56, 56, 239);
        }
        .item1{
            justify-self: end;
            align-self: self-end;
        }
        .item2{
            place-self: center;
        }
        .item3{
            justify-self: left;
            align-self: self-end;
        }
        .item5{
            justify-self: center;
            align-self: self-end;
        }
        .item6{
            justify-self: end;
        }
        .item7{
            justify-self: end;
            align-self: center;
        }
        .item8{
            align-self: center;
        }
        .item9{
            align-self: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item1"></div>
        <div class="item2"></div>
        <div class="item3"></div>
        <div class="item4"></div>
        <div class="item5"></div>
        <div class="item6"></div>
        <div class="item7"></div>
        <div class="item8"></div>
        <div class="item9"></div>
    </div>
</body>
</html>
