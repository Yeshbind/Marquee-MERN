<!DOCTYPE html>
<html>
<head>
<style>
.grid {
    display: grid;
    grid-template-columns: repeat(5, 40px);
    gap: 4px;
}

.box {
    width: 40px;
    height: 40px;
    background: #333;
}

.empty {
    width: 40px;
    height: 40px;
}
</style>
</head>
<body>

<div class="grid">
    <!-- Row 1 -->
    <div class="box"></div><div class="empty"></div><div class="empty"></div><div class="empty"></div><div class="box"></div>

    <!-- Row 2 -->
    <div class="empty"></div><div class="box"></div><div class="empty"></div><div class="box"></div><div class="empty"></div>

    <!-- Row 3 -->
    <div class="empty"></div><div class="empty"></div><div class="box"></div><div class="empty"></div><div class="empty"></div>

    <!-- Row 4 -->
    <div class="empty"></div><div class="empty"></div><div class="box"></div><div class="empty"></div><div class="empty"></div>

    <!-- Row 5 -->
    <div class="empty"></div><div class="empty"></div><div class="box"></div><div class="empty"></div><div class="empty"></div>
</div>

</body>
</html>
