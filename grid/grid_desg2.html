<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        .container{
            display: grid;
            grid-template-columns: 150px 150px 150px;
            grid-template-rows: 150px 150px 150px;
            background-color: rgb(236, 199, 199);
           
            border: 2px solid;
            gap: 10px;
            
        }
        .item1, .item2, .item3, .item4, .item5, .item6, .item7, .item8, .item9{
            width: 60px;
            height: 60px;
            background-color: rgb(30, 30, 50);
            
        }

        .item2{
           justify-self: center;
            align-self: self-end;
        }
        .item3{
            justify-self: end;
            /* align-self: self-end; */
        }
        .item4{
             align-self: center;
        }
        .item5{
           place-self: center;
        }
        .item6{
            justify-self: end;
             align-self: center;
        }
        .item7{
            /* justify-self: end;
            align-self: center; */
            align-self: end;
        }
        .item8{
            justify-self: center;
        }
        .item9{
            justify-self: end;
            align-self: end;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item1"></div>
        <div class="item2"></div>
        <div class="item3"></div>
        <div class="item4"></div>
        <div class="item5"></div>
        <div class="item6"></div>
        <div class="item7"></div>
        <div class="item8"></div>
        <div class="item9"></div>
    </div>
</body>
</html>
