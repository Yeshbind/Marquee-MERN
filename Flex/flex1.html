<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flex Layout</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:700px;
    height:400px;
    border:4px solid black;

    display:flex;
    flex-direction:column;
    gap:20px;
    padding:20px;
}

/* Common style */
.row{
    display:flex;
    gap:20px;
}

.box{
    border:4px solid black;
}

/* First row */
.top-left{
    flex:3;
    height:70px;
}

.top-right{
    flex:1;
    height:70px;
}

/* Middle row */
.small{
    flex:1;
    height:100px;
}

/* Bottom row */
.bottom{
    flex:1;
    height:100px;
}
</style>
</head>

<body>

<div class="container">

    <!-- Top Row -->
    <div class="row">
        <div class="box top-left"></div>
        <div class="box top-right"></div>
    </div>

    <!-- Middle Row -->
    <div class="row">
        <div class="box small"></div>
        <div class="box small"></div>
        <div class="box small"></div>
        <div class="box small"></div>
    </div>

    <!-- Bottom Row -->
    <div class="row">
        <div class="box bottom"></div>
        <div class="box bottom"></div>
    </div>

</div>

</body>
</html>
