    <script>
        let newstr = "yesh"
        delete newstr.__proto__.charAt()
        console.dir(newstr.__proto__)


        // creating a custom method in string function to rev the string
                String.prototype.reverseStr = function() {
                    const str = String(this);
                    let rev = "";

                    for (let i = str.length - 1; i >= 0; i--) {
                        rev += str[i];
                    }

                    return rev;
                };
                let revs ="aba".reverseStr()
                if( revs == "aba"){
                    console.log(true);
                } 
                else{
                    console.log(false);
                }

        
                
    </script>
