<style>
    h1{
        text-align: center;
        transition: 0.5s;

    .class1{
        color: green;
    }
    .class2{
        color: aquamarine;

    .class3{
        color: brown;
    }
</style>

<body>

<script>

let head = document.querySelector(".head");

let classes = ["class1", "class2", "class3"];

let index = 0;

setInterval(() => {

    head.classList.remove(classes[index]); // Removing current class

    index = (index + 1) % classes.length;  // Moving to the  next class

    head.classList.add(classes[index]);    // Add next class

}, 3000);

</script>
