<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    font-family:Arial;
}

.container{
    margin-top:30px;
    text-align:center;
}

#myDiv{
    width:220px;
    height:40px;
    border:1px solid black;
    font-size:24px;
    text-align:right;
    padding:5px;
    margin-bottom:10px;
}

button{
    width:50px;
    height:50px;
    margin:2px;
    font-size:18px;
}

#zoom{
    position:absolute;
    width:250px;
    height:100px;
    border:2px solid black;
    background:yellow;
    font-size:60px;
    font-weight:bold;
    text-align:center;
    line-height:100px;
    display:none;
    pointer-events:none;
}
</style>
</head>
<body>

<div class="container">

<div id="myDiv"></div>

<button>7</button>
<button>8</button>
<button>9</button>
<button>/</button><br>

<button>4</button>
<button>5</button>
<button>6</button>
<button>*</button><br>

<button>1</button>
<button>2</button>
<button>3</button>
<button>-</button><br>

<button>0</button>
<button>.</button>
<button>=</button>
<button>+</button><br>

<button>C</button>
<button>⌫</button>

</div>

<div id="zoom"></div>

<script>

let display = document.querySelector("#myDiv");
let zoom = document.querySelector("#zoom");
let buttons = document.querySelectorAll("button");

let expression = "";

buttons.forEach(function(button){

    button.addEventListener("click",function(){

        let value = this.innerText;

        if(value=="C"){
            expression="";
        }
        else if(value=="⌫"){
            expression=expression.slice(0,-1);
        }
        else if(value=="="){
            expression=eval(expression).toString();
        }
        else{
            expression+=value;
        }

        display.innerText=expression;
    });

});

//=========================================================== for zoom in eff

display.addEventListener("mousemove",function(e){

    zoom.style.display="block";
    zoom.style.left=(e.pageX+20)+"px";
    zoom.style.top=(e.pageY+20)+"px";

    zoom.innerText=display.innerText;

});

display.addEventListener("mouseleave",function(){

    zoom.style.display="none";

});

</script>

</body>
</html>
