<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p class="mainpara">This is a simple paragraph.</p>
    <script>
        let paragraph = document.querySelector(".mainpara");
        console.log(paragraph);
        console.log(paragraph.innerText);
        paragraph.innerHTML = "<b> Entered names: </b>."

        let name1 = prompt("Enter your name:");
        let name2 = prompt("Enter your name:");
        let name3 = prompt("Enter your name:");
        let name4 = prompt("Enter your name:");
        let name5 = prompt("Enter your name:");
        let names = [name1, name2, name3, name4, name5];
        let list = document.createElement("ul");
        for (let i = 0; i < names.length; i++) {
            let listItem = document.createElement("li");
            listItem.innerText = names[i];
            list.appendChild(listItem);
        }
        document.body.appendChild(list);  
      
    </script>
</body>

</html>
