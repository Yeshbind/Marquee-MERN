    <script>
        class person {

            constructor(name, age ,city, pincode){
                this.name =name,
                this.age = age,
                this.address = {
                    city1 : city,
                    pc : pincode

                }
            }
        }


        let aadmi  = new person("Yesh" , 23 , "vadodara" , 390023)

        class Car {

            constructor(company , year , model ,tyre1,tyre2,tyre3,tyre4, features){
                this.company = company,
                this.year = year,
                this.model = model,
                this.tyres = {
                    tyre1 : tyre1,
                    tyre2 : tyre2,
                    tyre3 : tyre3,
                    tyre4 : tyre4,

                }
                this.features = features
            }
        }

        let features = [ "panaromic" , "sunroof","autolock" , " aAdas"]

        let car1 = new Car ("bmw" , 2019 , "base",23,45,25,55,features )

        class employee{
            constructor(name,salary,skills,cart){
                this.name = name,
                this.salary = salary,
                this.skills = skills,
                this.cart = cart
            }
        }

        let emp1 = new  employee ("Yesh" , 740000 , ["java", "python","C"] , { keyboard : 3000 , watch : 10000})

        console.log(aadmi)
        console.log(car1)
        console.log(emp1)
