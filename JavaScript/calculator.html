<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a = 4;
        let b = 5;

        const calc = function(a , b, op){
            if (op == '+'){
                console.log(a + b);
            }
            else if(op == '-'){
                console.log(a - b);
            }
              else if(op == '/'){
                console.log(a / b);
            }
              else if(op == '*'){
                console.log(a * b);
            }
        }

        calc(a ,b,'+');
        calc(a ,b,'*');
    </script>
</body>
</html>
